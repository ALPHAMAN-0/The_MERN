version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: server
    ports:
      - '5050:5000'
    env_file:
      - ./server/.env
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: client
    ports:
      - '5173:5173'
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data: